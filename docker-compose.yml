version: '3.9'

# Momentum Finance - February 2026 Standards
# Features: BuildKit cache, health checks, resource limits, persistent volumes, non-root execution

services:
  finance:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - "type=registry,ref=localhost:5000/momentum-finance:buildcache"
      cache_to:
        - "type=registry,ref=localhost:5000/momentum-finance:buildcache,mode=max"
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: momentum-finance:latest
    container_name: momentum-finance
    
    # Non-root execution (hardened by default in Dockerfile)
    user: "1001:1001"
    
    # Volumes for data persistence
    volumes:
      - finance-data:/app/data
      - finance-logs:/app/logs
      - ./config:/app/config:ro  # Read-only config
    
    # Resource limits - higher for analytics
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
    
    # Port mapping
    ports:
      - "8080:8080"
    
    # Environment variables
    environment:
      - LOG_LEVEL=INFO
      - DATA_DIR=/app/data
      - CONFIG_DIR=/app/config
      - PYTHONUNBUFFERED=1
    
    # Health check
    healthcheck:
      test: ["CMD", "test", "-f", "/app/bin/MomentumFinanceCore"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=momentum-finance"
    
    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  finance-data:
    driver: local
  finance-logs:
    driver: local

networks:
  default:
    name: finance-network
    driver: bridge
